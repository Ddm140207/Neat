<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesion | Noty</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand-link" href="index.html">Noty</a>
    <h1>Iniciar sesion</h1>
    <form id="loginForm" class="form">
      <label for="email">Correo electronico</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="password">Contrasena</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button class="button primary" type="submit">Entrar</button>
      <p id="message" class="message" role="status"></p>
    </form>
    <p class="auth-switch">No tienes cuenta? <a href="register.html">Registrate</a></p>
  </main>
  <script src="js/api.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
</body>
</html>
